<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S3 Secure Upload | 1GB+</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    :root {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --border-color: #30363d;
      --text-main: #c9d1d9;
      --text-muted: #8b949e;
      --primary: #58a6ff;
      --primary-hover: #1f6feb;
      --error: #f85149;
      --success: #2ea043;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
    }

    .form-control {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
    }

    .file-drop-area {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      border: 2px dashed var(--border-color);
      border-radius: 8px;
      background-color: rgba(22, 27, 34, 0.5);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .file-drop-area:hover, .file-drop-area.dragover {
      border-color: var(--primary);
      background-color: rgba(88, 166, 255, 0.05);
    }

    .file-drop-area input[type="file"] {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      opacity: 0;
      cursor: pointer;
    }

    .file-msg {
      margin-top: 12px;
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
    }

    .file-icon {
      font-size: 36px;
      color: var(--primary);
      opacity: 0.9;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn:disabled {
      background: var(--border-color);
      color: var(--text-muted);
      cursor: not-allowed;
      transform: translateY(0);
    }

    .progress-container {
      display: none;
      margin-top: 25px;
      padding: 16px;
      background: rgba(13, 17, 23, 0.5);
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: var(--bg-color);
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 12px;
      border: 1px solid var(--border-color);
    }

    .progress-fill {
      height: 100%;
      background: var(--success);
      width: 0%;
      transition: width 0.3s ease;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(
        45deg,
        rgba(255, 255, 255, 0.15) 25%,
        transparent 25%,
        transparent 50%,
        rgba(255, 255, 255, 0.15) 50%,
        rgba(255, 255, 255, 0.15) 75%,
        transparent 75%,
        transparent
      );
      background-size: 1rem 1rem;
      animation: progress-animation 1s linear infinite;
    }

    @keyframes progress-animation {
      0% { background-position: 1rem 0; }
      100% { background-position: 0 0; }
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-main);
      font-weight: 500;
    }

    .status-msg {
      margin-top: 20px;
      padding: 14px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      display: none;
      font-weight: 500;
    }

    .status-success {
      background: rgba(46, 160, 67, 0.1);
      color: var(--success);
      border: 1px solid rgba(46, 160, 67, 0.3);
      display: block;
    }

    .status-error {
      background: rgba(248, 81, 73, 0.1);
      color: var(--error);
      border: 1px solid rgba(248, 81, 73, 0.3);
      display: block;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Secure File Upload</h1>
      <p>Upload large files directly to AWS S3 (Up to 5GB)</p>
    </div>

    <form id="uploadForm">
      <div class="form-group">
        <label>Select File</label>
        <div class="file-drop-area" id="dropArea">
          <div class="file-icon">📁</div>
          <span class="file-msg" id="fileMsg">Kéo thả file hoặc click để chọn<br>(Hỗ trợ file lớn > 1GB)</span>
          <input type="file" id="fileInput" required>
        </div>
      </div>

      <div class="form-group">
        <label for="secretCode">Secret Code</label>
        <input type="password" id="secretCode" class="form-control" placeholder="Nhập mã bảo mật để cho phép upload" required>
      </div>

      <button type="submit" class="btn" id="uploadBtn">Upload File</button>
    </form>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text">
        <span id="progressPercent">0%</span>
        <span id="progressBytes">0 MB / 0 MB</span>
      </div>
    </div>

    <div id="statusMsg" class="status-msg"></div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileMsg = document.getElementById('fileMsg');
    const dropArea = document.getElementById('dropArea');
    const uploadForm = document.getElementById('uploadForm');
    const secretCodeInput = document.getElementById('secretCode');
    const uploadBtn = document.getElementById('uploadBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const progressPercent = document.getElementById('progressPercent');
    const progressBytes = document.getElementById('progressBytes');
    const statusMsg = document.getElementById('statusMsg');

    // Display file selection details
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
        let sizeDisplay = `${sizeMB} MB`;
        if (file.size > 1024 * 1024 * 1024) {
          const sizeGB = (file.size / (1024 * 1024 * 1024)).toFixed(2);
          sizeDisplay = `${sizeGB} GB`;
        }
        fileMsg.innerHTML = `<strong style="color:var(--text-main)">${file.name}</strong><br>(${sizeDisplay})`;
      } else {
        fileMsg.innerHTML = 'Kéo thả file hoặc click để chọn<br>(Hỗ trợ file lớn > 1GB)';
      }
    });

    // Drag and drop mechanics
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
      dropArea.addEventListener(eventName, () => dropArea.classList.add('dragover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, () => dropArea.classList.remove('dragover'), false);
    });

    dropArea.addEventListener('drop', (e) => {
      const dt = e.dataTransfer;
      const files = dt.files;
      fileInput.files = files;
      const event = new Event('change', { bubbles: true });
      fileInput.dispatchEvent(event);
    });

    function showStatus(message, isError = false) {
      statusMsg.innerHTML = message;
      statusMsg.className = 'status-msg ' + (isError ? 'status-error' : 'status-success');
    }

    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const file = fileInput.files[0];
      const secretCode = secretCodeInput.value;

      if (!file) {
        showStatus('Vui lòng chọn 1 file!', true);
        return;
      }

      // Reset states
      statusMsg.style.display = 'none';
      uploadBtn.disabled = true;
      uploadBtn.textContent = 'Đang chuẩn bị...';
      progressContainer.style.display = 'block';
      progressFill.style.width = '0%';
      progressPercent.textContent = '0%';

      try {
        // Step 1: Request presigned URL from our Node backend
        const response = await fetch('/generate-presigned-url', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            fileName: file.name,
            fileType: file.type || 'application/octet-stream',
            secretCode: secretCode
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Lỗi khi lấy URL upload từ server');
        }

        const { uploadUrl, key } = data;

        // Step 2: Stream file directly to S3 via PUT request
        uploadBtn.textContent = 'Đang tải lên S3...';
        
        await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          
          xhr.upload.addEventListener('progress', (e) => {
            if (e.lengthComputable) {
              const percentComplete = Math.round((e.loaded / e.total) * 100);
              progressFill.style.width = percentComplete + '%';
              progressPercent.textContent = percentComplete + '%';
              
              const loadedMB = (e.loaded / (1024 * 1024)).toFixed(1);
              const totalMB = (e.total / (1024 * 1024)).toFixed(1);
              progressBytes.textContent = `${loadedMB} MB / ${totalMB} MB`;
            }
          });

          xhr.addEventListener('load', () => {
            if (xhr.status >= 200 && xhr.status < 300) {
              resolve();
            } else {
              reject(new Error(`Upload thất bại với mã lỗi HTTP ${xhr.status} (Kiểm tra CORS trên bucket S3)`));
            }
          });

          xhr.addEventListener('error', () => reject(new Error('Lỗi mạng trong quá trình upload')));
          xhr.addEventListener('abort', () => reject(new Error('Upload bị hủy')));

          xhr.open('PUT', uploadUrl, true);
          xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');
          xhr.send(file);
        });

        showStatus(`Tải lên thành công! 🎉<br><small style="font-weight:normal;opacity:0.8">Đã lưu tại: ${key}</small>`);
        uploadForm.reset();
        fileMsg.innerHTML = 'Kéo thả file hoặc click để chọn<br>(Hỗ trợ file lớn > 1GB)';
        
      } catch (error) {
        showStatus(error.message, true);
        progressContainer.style.display = 'none';
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = 'Upload File';
      }
    });

  </script>
</body>
</html>
